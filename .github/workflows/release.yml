name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            artifact: dist/echo-service-win32.zip
          - os: ubuntu-latest
            platform: linux
            artifact: dist/echo-service-linux.tar.gz
          - os: macos-14
            platform: darwin
            artifact: dist/echo-service-darwin.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\test.ps1

      - name: Run tests (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./scripts/test.sh

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\package.ps1

      - name: Package artifact (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./scripts/package.sh

      - name: Verify harness contract (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\verify.ps1

      - name: Verify harness contract (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./scripts/verify.sh

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: echo-service-${{ matrix.platform }}
          path: ${{ matrix.artifact }}

      - name: Upload verify artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-${{ matrix.platform }}
          path: output/verify
          if-no-files-found: warn

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: echo-service-*
          merge-multiple: true

      - name: Copy service manifest into release assets
        shell: bash
        run: |
          set -euo pipefail
          cp service.json release-assets/service.json

      - name: Compute release version
        id: version
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          version="$(date -u +%Y.%-m.%-d)-${short_sha}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/echo-service-win32.zip
            release-assets/echo-service-linux.tar.gz
            release-assets/echo-service-darwin.tar.gz
            release-assets/service.json
          generate_release_notes: true
