name: Validate Echo Service

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
          - os: ubuntu-latest
            platform: linux
          - os: macos-14
            platform: darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\package.ps1

      - name: Package artifact (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./scripts/package.sh

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\test.ps1

      - name: Run tests (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./scripts/test.sh

      - name: Verify harness contract (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\verify.ps1

      - name: Verify harness contract (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./scripts/verify.sh

      - name: Upload verify artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-${{ matrix.platform }}
          path: output/verify
          if-no-files-found: warn
